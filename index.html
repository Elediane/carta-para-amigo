<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carta</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            margin: 50px;
            background-color: #f9f9f9;
        }
        .carta {
            max-width: 600px;
            margin: auto;
            padding: 30px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .assinatura {
            margin-top: 40px;
            text-align: right;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="carta">
        <p>Itajaí, 06 de março de 2026</p>

        <p>Querido(a) amigo(a),</p>

        <p>
            Espero que esta carta encontre você bem. 
            Escrevo para compartilhar minhas últimas novidades e também para agradecer pela sua amizade.
        </p>

        <p>
            Em breve teremos novos projetos e estou animada para dividir essa jornada com você.
        </p>

        <p class="assinatura">
            Com carinho,<br>
            Elediane
        </p>
    </div>
</body>
</html>
